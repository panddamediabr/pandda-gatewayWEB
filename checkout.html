<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | DuoCast Technology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0F172A] text-slate-200 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="card p-10 bg-slate-900/50 border-white/5">
            <h2 class="text-sm font-black uppercase tracking-widest text-blue-500 mb-8">Resumo do Plano</h2>
            <div class="flex items-center gap-4 mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl">
                    <i class="fa-solid fa-microchip text-white"></i>
                </div>
                <div>
                    <h3 class="text-xl font-black uppercase italic">DuoCast <span class="text-blue-500">Full Access</span></h3>
                    <p class="text-xs text-slate-500 font-bold">Licença de Uso Mensal</p>
                </div>
            </div>

            <ul class="space-y-4 mb-10">
                <li class="flex justify-between text-sm">
                    <span class="text-slate-500">Protocolo de Redundância</span>
                    <span class="font-bold text-emerald-500">Ativo</span>
                </li>
                <li class="flex justify-between text-sm">
                    <span class="text-slate-500">Dispositivos de Acesso</span>
                    <span class="font-bold">02 Pontos</span>
                </li>
                <li class="flex justify-between text-sm">
                    <span class="text-slate-500">Sincronização Edge</span>
                    <span class="font-bold">Habilitada</span>
                </li>
            </ul>

            <div class="border-t border-white/10 pt-6">
                <div class="flex justify-between items-end">
                    <span class="text-xs font-black uppercase opacity-40">Total a pagar</span>
                    <span class="text-4xl font-black italic">R$ 36,49</span>
                </div>
            </div>
        </div>

        <div class="card p-10 bg-white text-slate-900">
            <h2 class="text-xl font-black uppercase italic mb-8">Finalizar <span class="text-blue-600">Contratação</span></h2>
            
            <form id="checkoutForm" class="space-y-6">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-2 block">Seu E-mail (Para envio da Licença)</label>
                    <input type="email" id="email" required placeholder="exemplo@email.com" 
                           class="w-full px-4 py-3 bg-slate-50 border-2 border-slate-100 rounded-xl focus:border-blue-600 outline-none text-slate-900">
                </div>

                <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 mb-6">
                    <p class="text-[10px] font-black uppercase text-blue-600 mb-4">Formas Disponíveis</p>
                    <div class="flex items-center gap-4">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="pay" checked class="hidden peer">
                            <div class="p-4 border-2 border-white bg-white rounded-xl text-center peer-checked:border-blue-600 peer-checked:bg-blue-50 transition-all shadow-sm">
                                <i class="fa-brands fa-pix text-2xl text-emerald-500 mb-1"></i>
                                <span class="block text-[9px] font-black uppercase">PIX Instantâneo</span>
                            </div>
                        </label>
                        <label class="flex-1 opacity-40 cursor-not-allowed">
                            <div class="p-4 border-2 border-white bg-white rounded-xl text-center shadow-sm">
                                <i class="fa-regular fa-credit-card text-2xl text-slate-400 mb-1"></i>
                                <span class="block text-[9px] font-black uppercase">Cartão</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-5 rounded-xl text-white font-black text-sm uppercase tracking-widest shadow-xl shadow-blue-600/20 transition-all">
                    Gerar Pagamento Seguro
                </button>
                
                <p class="text-center text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                    <i class="fa-solid fa-lock mr-1"></i> Transação criptografada pela Pandda Labs
                </p>
            </form>
        </div>
    </div>
    
    <script src="checkout.js" type="module"></script>
</body>
</html>
